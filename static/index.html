<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            /*background: linear-gradient(130deg, #0f5073 0%, #ad537a 100%);*/
            background: linear-gradient(130deg, #0f5073 0%, #132e46 100%);
            /*background-color: #132e46;*/
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #cbcfd4;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            /*background-color: rgb(43, 71, 96);*/
            /*background-color: #0c3757;*/
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            background: #e1e8ed;
            border-bottom: 2px solid #e1e8ed;
        }


        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #cbcfd4;
        }
        
        .tab.active {
            color: #0f5073;
            background: #cbcfd4;
            border-bottom: 3px solid #0f5073;
        }
        
        .content {
            padding: 30px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-section {
            background: #e1e8ed;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input {
            background-color: #cbcfd4;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #132e46;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            /*background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);*/
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            color: white;
            margin-left: 8px;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-export {
            background: #28a745;
            color: white;
            margin-right: 10px;
            position: relative;
        }
        
        .btn-export:hover {
            background: #218838;
        }
        
        .export-dropdown {
            position: relative;
            display: inline-block;
        }
        
        .export-menu {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 200px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            z-index: 1000;
            top: 45px;
            right: 0;
            overflow: hidden;
        }
        
        .export-menu.show {
            display: block;
        }
        
        .export-option {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            color: #333;
            font-weight: 500;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .export-option:last-child {
            border-bottom: none;
        }
        
        .export-option:hover {
            background-color: #f8f9fa;
        }
        
        .btn-import {
            background: #007bff;
            color: white;
            margin-right: 10px;
        }
        
        .btn-import:hover {
            background: #0056b3;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow: auto;
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            color: #333;
            margin: 0;
        }
        
        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        
        .close:hover {
            color: #000;
        }
        
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }
        
        .preview-table th,
        .preview-table td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        
        .preview-table th {
            background-color: #132e46;
            color: white;
            font-weight: 600;
        }
        
        .preview-table tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        
        .preview-table tr.invalid {
            background-color: #ffe6e6;
        }
        
        .preview-stats {
            background: #e1e8ed;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .preview-stats p {
            margin: 5px 0;
            color: #333;
        }
        
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .companies-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .companies-table thead {
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            color: white;
        }
        
        .companies-table th {
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        
        .companies-table td {
            padding: 12px;
            border-bottom: 1px solid #e1e8ed;
            font-size: 14px;
        }
        
        .companies-table tbody tr {
            transition: background-color 0.2s;
        }
        
        .companies-table tbody tr:hover {
            background-color: #f8f9fa;
        }
        
        .companies-table .actions-cell {
            white-space: nowrap;
            width: 130px;
        }
        
        .companies-table .actions-cell .btn {
            padding: 6px 12px;
            font-size: 12px;
            margin-right: 4px;
        }
        
        .companies-table .code-cell {
            width: 100px;
            font-weight: 600;
            color: #0f5073;
        }
        
        .companies-table .expand-cell {
            width: 40px;
            text-align: center;
        }
        
        .expand-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            padding: 4px;
            transition: transform 0.3s;
        }
        
        .expand-btn:hover {
            color: #0f5073;
        }
        
        .expand-btn.expanded {
            transform: rotate(180deg);
        }
        
        .details-row {
            display: none;
            background-color: #f8f9fa;
        }
        
        .details-row.show {
            display: table-row;
        }
        
        .details-cell {
            padding: 20px !important;
            border-bottom: 2px solid #e1e8ed !important;
        }
        
        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .detail-item {
            font-size: 13px;
        }
        
        .detail-item strong {
            display: block;
            color: #555;
            margin-bottom: 4px;
            font-size: 12px;
        }
        
        .detail-item span {
            color: #333;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .btn-edit {
            background: #ffc107;
            color: #333;
            padding: 8px 16px;
            font-size: 13px;
            margin-right: 8px;
        }
        
        .btn-edit:hover {
            background: #e0a800;
        }
        
        .entries-section {
            margin-top: 30px;
        }
        
        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .entries-header h3 {
            color: #333;
            font-size: 20px;
        }
        
        .search-box {
            padding: 10px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #132e46;
        }
        
        .entries-list {
            display: grid;
            gap: 16px;
        }
        
        .entry-card {
            background: white;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .entry-card:hover {
            border-color: #132e46;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        
        .entry-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        .entry-type {
            background: #132e46;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .entry-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .entry-detail {
            font-size: 14px;
        }
        
        .entry-detail strong {
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        
        .entry-detail span {
            color: #333;
        }
        
        .entry-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📇 Address Book Manager</h1>
            <p>Manage your personal and business contacts</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('individuals')">👤 Individuals</button>
            <button class="tab" onclick="switchTab('companies')">🏢 Companies</button>
        </div>
        
        <div class="content">
            <!-- Individuals Tab -->
            <div id="individuals-tab" class="tab-content active">
                <div class="form-section">
                    <h3>Add Individual Contact</h3>
                    <form id="individual-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" name="lastName" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" name="email">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" name="phone">
                            </div>
                            <div class="form-group">
                                <label>Mobile</label>
                                <input type="tel" name="mobile">
                            </div>
                            <div class="form-group">
                                <label>Job Title</label>
                                <input type="text" name="jobTitle">
                            </div>
                            <div class="form-group">
                                <label>Company</label>
                                <input type="text" name="company">
                            </div>
                            <div class="form-group">
                                <label>Birthday</label>
                                <input type="date" name="birthday">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Street Address</label>
                                <input type="text" name="street">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" name="city">
                            </div>
                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" name="state">
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" name="postalCode">
                            </div>
                            <div class="form-group">
                                <label>Country</label>
                                <input type="text" name="country">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>Notes</label>
                                <textarea name="notes"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Individual</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm('individual-form')">Clear Form</button>
                    </form>
                </div>
                
                <div class="entries-section">
                    <div class="entries-header">
                        <h3>Individual Contacts</h3>
                        <div>
                            <button class="btn btn-import" onclick="document.getElementById('import-individual').click()">📥 Import</button>
                            <input type="file" id="import-individual" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event, 'individual')">
                            <div class="export-dropdown">
                                <button class="btn btn-export" onclick="toggleExportMenu('individual')">📤 Export</button>
                                <div id="export-menu-individual" class="export-menu">
                                    <div class="export-option" onclick="exportToExcel('individual'); hideExportMenu('individual')">📊 Export to Excel</div>
                                    <div class="export-option" onclick="exportToPDF('individual'); hideExportMenu('individual')">📄 Export to PDF</div>
                                </div>
                            </div>
                            <input type="text" class="search-box" placeholder="Search individuals..." onkeyup="filterEntries('individual', this.value)">
                        </div>
                    </div>
                    <div id="individuals-list" class="entries-list"></div>
                </div>
            </div>
            
            <!-- Companies Tab -->
            <div id="companies-tab" class="tab-content">
                <div class="form-section">
                    <h3>Add Company Contact</h3>
                    <form id="company-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Company Code</label>
                                <input type="text" name="companyCode">
                            </div>
                            <div class="form-group">
                                <label>Company Name *</label>
                                <input type="text" name="companyName" required>
                            </div>
                            <div class="form-group">
                                <label>Industry</label>
                                <input type="text" name="industry">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" name="email">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" name="phone">
                            </div>
                            <div class="form-group">
                                <label>Mobile Phone</label>
                                <input type="tel" name="mobPhone">
                            </div>
                            <div class="form-group">
                                <label>Website</label>
                                <input type="url" name="website">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Street Address</label>
                                <input type="text" name="street">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" name="city">
                            </div>
                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" name="state">
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" name="postalCode">
                            </div>
                            <div class="form-group">
                                <label>Country</label>
                                <input type="text" name="country">
                            </div>
                            <div class="form-group">
                                <label>Bank Account</label>
                                <input type="text" name="bankAccount" maxlength="15" pattern="[0-9]{0,15}" title="Enter up to 15 digits">
                            </div>
                            <div class="form-group">
                                <label>EMBS</label>
                                <input type="text" name="embs">
                            </div>
                            <div class="form-group">
                                <label>EMDB</label>
                                <input type="text" name="emdb">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Company</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm('company-form')">Clear Form</button>
                    </form>
                </div>
                
                <div class="entries-section">
                    <div class="entries-header">
                        <h3>Company Contacts</h3>
                        <div>
                            <button class="btn btn-import" onclick="document.getElementById('import-company').click()">📥 Import</button>
                            <input type="file" id="import-company" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event, 'company')">
                            <div class="export-dropdown">
                                <button class="btn btn-export" onclick="toggleExportMenu('company')">📤 Export</button>
                                <div id="export-menu-company" class="export-menu">
                                    <div class="export-option" onclick="exportToExcel('company'); hideExportMenu('company')">📊 Export to Excel</div>
                                    <div class="export-option" onclick="exportToPDF('company'); hideExportMenu('company')">📄 Export to PDF</div>
                                </div>
                            </div>
                            <input type="text" class="search-box" placeholder="Search companies..." onkeyup="filterEntries('company', this.value)">
                        </div>
                    </div>
                    <div id="companies-list" class="entries-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Import Preview Modal -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Import Preview</h2>
                <span class="close" onclick="closeImportModal()">&times;</span>
            </div>
            <div class="preview-stats" id="import-stats"></div>
            <div id="import-preview" style="overflow-x: auto;"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeImportModal()">Cancel</button>
                <button class="btn btn-primary" id="confirm-import-btn" onclick="confirmImport()">Import Valid Records</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // Data storage
        let individuals = [];
        let companies = [];
        let editingId = null;
        let editingType = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await loadIndividuals();
            await loadCompanies();
            
            document.getElementById('individual-form').addEventListener('submit', handleIndividualSubmit);
            document.getElementById('company-form').addEventListener('submit', handleCompanySubmit);
        });
        
        // Load data from API
        async function loadIndividuals() {
            try {
                const response = await fetch('/api/individuals');
                individuals = await response.json();
                renderIndividuals();
            } catch (error) {
                console.error('Error loading individuals:', error);
            }
        }
        
        async function loadCompanies() {
            try {
                const response = await fetch('/api/companies');
                companies = await response.json();
                renderCompanies();
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // Form handlers
        async function handleIndividualSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                mobile: formData.get('mobile'),
                jobTitle: formData.get('jobTitle'),
                company: formData.get('company'),
                birthday: formData.get('birthday'),
                street: formData.get('street'),
                city: formData.get('city'),
                state: formData.get('state'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                notes: formData.get('notes')
            };
            
            try {
                if (editingId) {
                    // Update existing
                    const response = await fetch(`/api/individuals/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                        e.target.reset();
                        e.target.querySelector('button[type="submit"]').textContent = 'Add Individual';
                        editingId = null;
                    }
                } else {
                    // Create new
                    const response = await fetch('/api/individuals', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                        e.target.reset();
                    }
                }
            } catch (error) {
                console.error('Error saving individual:', error);
                alert('Failed to save contact');
            }
        }
        
        async function handleCompanySubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                companyCode: formData.get('companyCode'),
                companyName: formData.get('companyName'),
                industry: formData.get('industry'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                mobPhone: formData.get('mobPhone'),
                website: formData.get('website'),
                street: formData.get('street'),
                city: formData.get('city'),
                state: formData.get('state'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                bankAccount: formData.get('bankAccount'),
                embs: formData.get('embs'),
                emdb: formData.get('emdb')
            };
            
            try {
                if (editingId) {
                    // Update existing
                    const response = await fetch(`/api/companies/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                        e.target.reset();
                        e.target.querySelector('button[type="submit"]').textContent = 'Add Company';
                        editingId = null;
                    }
                } else {
                    // Create new
                    const response = await fetch('/api/companies', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                        e.target.reset();
                    }
                }
            } catch (error) {
                console.error('Error saving company:', error);
                alert('Failed to save company');
            }
        }
        
        // Render functions
        function renderIndividuals(filter = '') {
            const list = document.getElementById('individuals-list');
            const filtered = individuals.filter(i => 
                (i.firstName + ' ' + i.lastName + ' ' + i.email + ' ' + i.company).toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <h3>No individual contacts found</h3>
                        <p>Add your first contact using the form above</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(person => `
                <div class="entry-card">
                    <div class="entry-header">
                        <div class="entry-title">${person.firstName} ${person.lastName}</div>
                        <div class="entry-type">Individual</div>
                    </div>
                    <div class="entry-details">
                        ${person.email ? `<div class="entry-detail"><strong>Email:</strong> <span>${person.email}</span></div>` : ''}
                        ${person.phone ? `<div class="entry-detail"><strong>Phone:</strong> <span>${person.phone}</span></div>` : ''}
                        ${person.mobile ? `<div class="entry-detail"><strong>Mobile:</strong> <span>${person.mobile}</span></div>` : ''}
                        ${person.jobTitle ? `<div class="entry-detail"><strong>Job Title:</strong> <span>${person.jobTitle}</span></div>` : ''}
                        ${person.company ? `<div class="entry-detail"><strong>Company:</strong> <span>${person.company}</span></div>` : ''}
                        ${person.birthday ? `<div class="entry-detail"><strong>Birthday:</strong> <span>${person.birthday}</span></div>` : ''}
                        ${person.street || person.city ? `<div class="entry-detail"><strong>Address:</strong> <span>${[person.street, person.city, person.state, person.postalCode, person.country].filter(Boolean).join(', ')}</span></div>` : ''}
                        ${person.notes ? `<div class="entry-detail" style="grid-column: 1 / -1;"><strong>Notes:</strong> <span>${person.notes}</span></div>` : ''}
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-edit" onclick="editIndividual('${person.id}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteIndividual('${person.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderCompanies(filter = '') {
            const list = document.getElementById('companies-list');
            const filtered = companies.filter(c => 
                (c.companyCode + ' ' + c.companyName + ' ' + c.industry + ' ' + c.email).toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                        <h3>No company contacts found</h3>
                        <p>Add your first company using the form above</p>
                    </div>
                `;
                return;
            }
            
            let tableHTML = `
                <table class="companies-table">
                    <thead>
                        <tr>
                            <th>Actions</th>
                            <th>Code</th>
                            <th>Company Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtered.forEach(company => {
                const hasDetails = company.industry || company.mobPhone || company.website || 
                                  company.embs || company.bankAccount || company.street || 
                                  company.city || company.emdb;
                
                tableHTML += `
                    <tr>
                        <td class="actions-cell">
                            <button class="btn btn-edit" onclick="editCompany('${company.id}')">Edit</button>
                            <button class="btn btn-delete" onclick="deleteCompany('${company.id}')">Delete</button>
                        </td>
                        <td class="code-cell">${company.companyCode || '-'}</td>
                        <td>${company.companyName}</td>
                        <td>${company.email || '-'}</td>
                        <td>${company.phone || '-'}</td>
                        <td class="expand-cell">
                            ${hasDetails ? `<button class="expand-btn" onclick="toggleCompanyDetails('${company.id}')">▼</button>` : ''}
                        </td>
                    </tr>
                    ${hasDetails ? `
                    <tr class="details-row" id="details-${company.id}">
                        <td colspan="6" class="details-cell">
                            <div class="details-grid">
                                ${company.industry ? `<div class="detail-item"><strong>Industry</strong><span>${company.industry}</span></div>` : ''}
                                ${company.website ? `<div class="detail-item"><strong>Website</strong><span>${company.website}</span></div>` : ''}
                                ${company.mobPhone ? `<div class="detail-item"><strong>Mobile Phone</strong><span>${company.mobPhone}</span></div>` : ''}
                                ${company.bankAccount ? `<div class="detail-item"><strong>Bank Account</strong><span>${company.bankAccount}</span></div>` : ''}
                                ${company.embs ? `<div class="detail-item"><strong>EMBS</strong><span>${company.embs}</span></div>` : ''}
                                ${company.street || company.city ? `<div class="detail-item"><strong>Address</strong><span>${[company.street, company.city, company.state, company.postalCode, company.country].filter(Boolean).join(', ')}</span></div>` : ''}
                                ${company.emdb ? `<div class="detail-item" style="grid-column: 1 / -1;"><strong>EMDB</strong><span>${company.emdb}</span></div>` : ''}
                            </div>
                        </td>
                    </tr>
                    ` : ''}
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            list.innerHTML = tableHTML;
        }
        
        function toggleCompanyDetails(id) {
            const detailsRow = document.getElementById(`details-${id}`);
            const expandBtn = event.target;
            
            if (detailsRow) {
                detailsRow.classList.toggle('show');
                expandBtn.classList.toggle('expanded');
            }
            form.city.value = person.city || '';
            form.state.value = person.state || '';
            form.postalCode.value = person.postalCode || '';
            form.country.value = person.country || '';
            form.notes.value = person.notes || '';
            
            form.querySelector('button[type="submit"]').textContent = 'Update Individual';
            form.scrollIntoView({ behavior: 'smooth' });
        }
        
        function editCompany(id) {
            const company = companies.find(c => c.id === id);
            if (!company) return;
            
            editingId = id;
            const form = document.getElementById('company-form');
            
            form.companyCode.value = company.companyCode || '';
            form.companyName.value = company.companyName || '';
            form.industry.value = company.industry || '';
            form.email.value = company.email || '';
            form.phone.value = company.phone || '';
            form.mobPhone.value = company.mobPhone || '';
            form.website.value = company.website || '';
            form.street.value = company.street || '';
            form.city.value = company.city || '';
            form.state.value = company.state || '';
            form.postalCode.value = company.postalCode || '';
            form.country.value = company.country || '';
            form.bankAccount.value = company.bankAccount || '';
            form.embs.value = company.embs || '';
            form.emdb.value = company.emdb || '';
            
            form.querySelector('button[type="submit"]').textContent = 'Update Company';
            form.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Delete functions
        async function deleteIndividual(id) {
            if (confirm('Are you sure you want to delete this contact?')) {
                try {
                    const response = await fetch(`/api/individuals/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                    }
                } catch (error) {
                    console.error('Error deleting individual:', error);
                    alert('Failed to delete contact');
                }
            }
        }
        
        async function deleteCompany(id) {
            if (confirm('Are you sure you want to delete this company?')) {
                try {
                    const response = await fetch(`/api/companies/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                    }
                } catch (error) {
                    console.error('Error deleting company:', error);
                    alert('Failed to delete company');
                }
            }
        }
        
        // Utility functions
        function resetForm(formId) {
            document.getElementById(formId).reset();
            editingId = null;
            const submitBtn = document.getElementById(formId).querySelector('button[type="submit"]');
            submitBtn.textContent = formId === 'individual-form' ? 'Add Individual' : 'Add Company';
        }
        
        function filterEntries(type, value) {
            if (type === 'individual') {
                renderIndividuals(value);
            } else {
                renderCompanies(value);
            }
        }
        
        // Export to Excel
        function exportToExcel(type) {
            const data = type === 'individual' ? individuals : companies;
            if (data.length === 0) {
                alert('No data to export');
                return;
            }
            
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, type === 'individual' ? 'Individuals' : 'Companies');
            
            const fileName = `${type}_contacts_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }
        
        // Export to PDF
        function exportToPDF(type) {
            const data = type === 'individual' ? individuals : companies;
            if (data.length === 0) {
                alert('No data to export');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFontSize(18);
            doc.text(type === 'individual' ? 'Individual Contacts' : 'Company Contacts', 14, 22);
            
            if (type === 'individual') {
                const tableData = data.map(p => [
                    `${p.firstName} ${p.lastName}`,
                    p.email || '',
                    p.phone || '',
                    p.company || '',
                    p.jobTitle || '',
                    [p.street, p.city, p.state].filter(Boolean).join(', ')
                ]);
                
                doc.autoTable({
                    head: [['Name', 'Email', 'Phone', 'Company', 'Job Title', 'Address']],
                    body: tableData,
                    startY: 30,
                    styles: { fontSize: 8 }
                });
            } else {
                const tableData = data.map(c => [
                    c.companyCode || '',
                    c.companyName,
                    c.industry || '',
                    c.email || '',
                    c.phone || '',
                    c.mobPhone || '',
                    [c.street, c.city, c.state].filter(Boolean).join(', ')
                ]);
                
                doc.autoTable({
                    head: [['Code', 'Company', 'Industry', 'Email', 'Phone', 'Mobile Phone', 'Address']],
                    body: tableData,
                    startY: 30,
                    styles: { fontSize: 8 }
                });
            }
            
            const fileName = `${type}_contacts_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(fileName);
        }
        
        // Toggle export menu
        function toggleExportMenu(type) {
            const menu = document.getElementById(`export-menu-${type}`);
            menu.classList.toggle('show');
        }
        
        // Hide export menu
        function hideExportMenu(type) {
            const menu = document.getElementById(`export-menu-${type}`);
            menu.classList.remove('show');
        }
        
        // Close export menus when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.export-dropdown')) {
                document.querySelectorAll('.export-menu').forEach(menu => {
                    menu.classList.remove('show');
                });
            }
        });
        
        // Import functionality
        let importData = [];
        let importType = '';
        
        function handleImport(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            
            importType = type;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    if (jsonData.length === 0) {
                        alert('The Excel file is empty or has no valid data.');
                        return;
                    }
                    
                    // Validate and prepare data
                    const validData = [];
                    const invalidData = [];
                    
                    jsonData.forEach((row, index) => {
                        const isValid = validateImportRow(row, type);
                        const rowData = { ...row, _rowNumber: index + 2, _isValid: isValid };
                        
                        if (isValid) {
                            validData.push(rowData);
                        } else {
                            invalidData.push(rowData);
                        }
                    });
                    
                    importData = validData;
                    showImportPreview(validData, invalidData, type);
                    
                } catch (error) {
                    alert('Error reading Excel file: ' + error.message);
                    console.error(error);
                }
            };
            
            reader.readAsArrayBuffer(file);
            // Reset file input
            event.target.value = '';
        }
        
        function validateImportRow(row, type) {
            if (type === 'individual') {
                return row.firstName && row.firstName.toString().trim() !== '' &&
                       row.lastName && row.lastName.toString().trim() !== '';
            } else {
                return row.companyName && row.companyName.toString().trim() !== '';
            }
        }
        
        function showImportPreview(validData, invalidData, type) {
            const modal = document.getElementById('import-modal');
            const statsDiv = document.getElementById('import-stats');
            const previewDiv = document.getElementById('import-preview');
            
            // Show stats
            statsDiv.innerHTML = `
                <p><strong>Total rows:</strong> ${validData.length + invalidData.length}</p>
                <p><strong>Valid rows (will be imported):</strong> <span style="color: #28a745;">${validData.length}</span></p>
                <p><strong>Invalid rows (will be skipped):</strong> <span style="color: #dc3545;">${invalidData.length}</span></p>
                ${invalidData.length > 0 ? '<p style="color: #dc3545; margin-top: 10px;">⚠️ Invalid rows are highlighted in red below (missing required fields)</p>' : ''}
            `;
            
            // Show preview table
            if (validData.length === 0 && invalidData.length === 0) {
                previewDiv.innerHTML = '<p>No data to preview</p>';
            } else {
                const allData = [...validData, ...invalidData];
                const columns = type === 'individual' 
                    ? ['firstName', 'lastName', 'email', 'phone', 'mobile', 'company', 'jobTitle']
                    : ['companyCode', 'companyName', 'industry', 'email', 'phone', 'mobPhone', 'bankAccount', 'embs'];
                
                let tableHTML = '<table class="preview-table"><thead><tr>';
                tableHTML += '<th>Row</th>';
                columns.forEach(col => {
                    const required = (type === 'individual' && (col === 'firstName' || col === 'lastName')) ||
                                   (type === 'company' && col === 'companyName');
                    tableHTML += `<th>${col}${required ? ' *' : ''}</th>`;
                });
                tableHTML += '</tr></thead><tbody>';
                
                allData.forEach(row => {
                    tableHTML += `<tr class="${row._isValid ? '' : 'invalid'}">`;
                    tableHTML += `<td>${row._rowNumber}</td>`;
                    columns.forEach(col => {
                        const value = row[col] || '';
                        tableHTML += `<td>${value}</td>`;
                    });
                    tableHTML += '</tr>';
                });
                
                tableHTML += '</tbody></table>';
                previewDiv.innerHTML = tableHTML;
            }
            
            // Enable/disable import button
            document.getElementById('confirm-import-btn').disabled = validData.length === 0;
            
            modal.style.display = 'block';
        }
        
        function closeImportModal() {
            document.getElementById('import-modal').style.display = 'none';
            importData = [];
        }
        
        async function confirmImport() {
            if (importData.length === 0) {
                alert('No valid data to import');
                return;
            }
            
            const confirmBtn = document.getElementById('confirm-import-btn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Importing...';
            
            let successCount = 0;
            let errorCount = 0;
            
            for (const row of importData) {
                try {
                    // Remove metadata fields
                    const { _rowNumber, _isValid, id, created_at, updated_at, ...cleanData } = row;
                    
                    const endpoint = importType === 'individual' ? '/api/individuals' : '/api/companies';
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(cleanData)
                    });
                    
                    if (response.ok) {
                        successCount++;
                    } else {
                        errorCount++;
                    }
                } catch (error) {
                    console.error('Error importing row:', error);
                    errorCount++;
                }
            }
            
            closeImportModal();
            
            // Show result
            alert(`Import completed!\n\nSuccessfully imported: ${successCount}\nFailed: ${errorCount}`);
            
            // Reload data
            if (importType === 'individual') {
                loadIndividuals();
            } else {
                loadCompanies();
            }
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('import-modal');
            if (event.target === modal) {
                closeImportModal();
            }
        };
    </script>
</body>
