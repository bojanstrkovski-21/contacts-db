<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            /*background: linear-gradient(130deg, #0f5073 0%, #ad537a 100%);*/
            background: linear-gradient(130deg, #0f5073 0%, #132e46 100%);
            /*background-color: #132e46;*/
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #cbcfd4;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            /*background-color: rgb(43, 71, 96);*/
            /*background-color: #0c3757;*/
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            background: #e1e8ed;
            border-bottom: 2px solid #e1e8ed;
        }


        
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #cbcfd4;
        }
        
        .tab.active {
            color: #0f5073;
            background: #cbcfd4;
            border-bottom: 3px solid #0f5073;
        }
        
        .content {
            padding: 30px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-section {
            background: #e1e8ed;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-section h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input {
            background-color: #cbcfd4;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #132e46;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            /*background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);*/
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #112e48 0%, #0f5073 100%);
            color: white;
            margin-left: 8px;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-export {
            background: #28a745;
            color: white;
            margin-right: 10px;
        }
        
        .btn-export:hover {
            background: #218838;
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .btn-edit {
            background: #ffc107;
            color: #333;
            padding: 8px 16px;
            font-size: 13px;
            margin-right: 8px;
        }
        
        .btn-edit:hover {
            background: #e0a800;
        }
        
        .entries-section {
            margin-top: 30px;
        }
        
        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .entries-header h3 {
            color: #333;
            font-size: 20px;
        }
        
        .search-box {
            padding: 10px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            width: 300px;
            font-size: 14px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: #132e46;
        }
        
        .entries-list {
            display: grid;
            gap: 16px;
        }
        
        .entry-card {
            background: white;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .entry-card:hover {
            border-color: #132e46;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        
        .entry-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }
        
        .entry-type {
            background: #132e46;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .entry-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .entry-detail {
            font-size: 14px;
        }
        
        .entry-detail strong {
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        
        .entry-detail span {
            color: #333;
        }
        
        .entry-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📇 Address Book Manager</h1>
            <p>Manage your personal and business contacts</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('individuals')">👤 Individuals</button>
            <button class="tab" onclick="switchTab('companies')">🏢 Companies</button>
        </div>
        
        <div class="content">
            <!-- Individuals Tab -->
            <div id="individuals-tab" class="tab-content active">
                <div class="form-section">
                    <h3>Add Individual Contact</h3>
                    <form id="individual-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>First Name *</label>
                                <input type="text" name="firstName" required>
                            </div>
                            <div class="form-group">
                                <label>Last Name *</label>
                                <input type="text" name="lastName" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" name="email">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" name="phone">
                            </div>
                            <div class="form-group">
                                <label>Mobile</label>
                                <input type="tel" name="mobile">
                            </div>
                            <div class="form-group">
                                <label>Job Title</label>
                                <input type="text" name="jobTitle">
                            </div>
                            <div class="form-group">
                                <label>Company</label>
                                <input type="text" name="company">
                            </div>
                            <div class="form-group">
                                <label>Birthday</label>
                                <input type="date" name="birthday">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Street Address</label>
                                <input type="text" name="street">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" name="city">
                            </div>
                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" name="state">
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" name="postalCode">
                            </div>
                            <div class="form-group">
                                <label>Country</label>
                                <input type="text" name="country">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>Notes</label>
                                <textarea name="notes"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Individual</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm('individual-form')">Clear Form</button>
                    </form>
                </div>
                
                <div class="entries-section">
                    <div class="entries-header">
                        <h3>Individual Contacts</h3>
                        <div>
                            <button class="btn btn-export" onclick="exportToExcel('individual')">📊 Export to Excel</button>
                            <button class="btn btn-export" onclick="exportToPDF('individual')">📄 Export to PDF</button>
                            <input type="text" class="search-box" placeholder="Search individuals..." onkeyup="filterEntries('individual', this.value)">
                        </div>
                    </div>
                    <div id="individuals-list" class="entries-list"></div>
                </div>
            </div>
            
            <!-- Companies Tab -->
            <div id="companies-tab" class="tab-content">
                <div class="form-section">
                    <h3>Add Company Contact</h3>
                    <form id="company-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Company Name *</label>
                                <input type="text" name="companyName" required>
                            </div>
                            <div class="form-group">
                                <label>Industry</label>
                                <input type="text" name="industry">
                            </div>
                            <div class="form-group">
                                <label>Main Email</label>
                                <input type="email" name="email">
                            </div>
                            <div class="form-group">
                                <label>Main Phone</label>
                                <input type="tel" name="phone">
                            </div>
                            <div class="form-group">
                                <label>Fax</label>
                                <input type="tel" name="fax">
                            </div>
                            <div class="form-group">
                                <label>Website</label>
                                <input type="url" name="website">
                            </div>
                            <div class="form-group">
                                <label>Contact Person</label>
                                <input type="text" name="contactPerson">
                            </div>
                            <div class="form-group">
                                <label>Contact Title</label>
                                <input type="text" name="contactTitle">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Street Address</label>
                                <input type="text" name="street">
                            </div>
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" name="city">
                            </div>
                            <div class="form-group">
                                <label>State/Province</label>
                                <input type="text" name="state">
                            </div>
                            <div class="form-group">
                                <label>Postal Code</label>
                                <input type="text" name="postalCode">
                            </div>
                            <div class="form-group">
                                <label>Country</label>
                                <input type="text" name="country">
                            </div>
                            <div class="form-group">
                                <label>Tax ID / VAT</label>
                                <input type="text" name="taxId">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label>Notes</label>
                                <textarea name="notes"></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Company</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm('company-form')">Clear Form</button>
                    </form>
                </div>
                
                <div class="entries-section">
                    <div class="entries-header">
                        <h3>Company Contacts</h3>
                        <div>
                            <button class="btn btn-export" onclick="exportToExcel('company')">📊 Export to Excel</button>
                            <button class="btn btn-export" onclick="exportToPDF('company')">📄 Export to PDF</button>
                            <input type="text" class="search-box" placeholder="Search companies..." onkeyup="filterEntries('company', this.value)">
                        </div>
                    </div>
                    <div id="companies-list" class="entries-list"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        // Data storage
        let individuals = [];
        let companies = [];
        let editingId = null;
        let editingType = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', async function() {
            await loadIndividuals();
            await loadCompanies();
            
            document.getElementById('individual-form').addEventListener('submit', handleIndividualSubmit);
            document.getElementById('company-form').addEventListener('submit', handleCompanySubmit);
        });
        
        // Load data from API
        async function loadIndividuals() {
            try {
                const response = await fetch('/api/individuals');
                individuals = await response.json();
                renderIndividuals();
            } catch (error) {
                console.error('Error loading individuals:', error);
            }
        }
        
        async function loadCompanies() {
            try {
                const response = await fetch('/api/companies');
                companies = await response.json();
                renderCompanies();
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // Form handlers
        async function handleIndividualSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                mobile: formData.get('mobile'),
                jobTitle: formData.get('jobTitle'),
                company: formData.get('company'),
                birthday: formData.get('birthday'),
                street: formData.get('street'),
                city: formData.get('city'),
                state: formData.get('state'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                notes: formData.get('notes')
            };
            
            try {
                if (editingId) {
                    // Update existing
                    const response = await fetch(`/api/individuals/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                        e.target.reset();
                        e.target.querySelector('button[type="submit"]').textContent = 'Add Individual';
                        editingId = null;
                    }
                } else {
                    // Create new
                    const response = await fetch('/api/individuals', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                        e.target.reset();
                    }
                }
            } catch (error) {
                console.error('Error saving individual:', error);
                alert('Failed to save contact');
            }
        }
        
        async function handleCompanySubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                companyName: formData.get('companyName'),
                industry: formData.get('industry'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                fax: formData.get('fax'),
                website: formData.get('website'),
                contactPerson: formData.get('contactPerson'),
                contactTitle: formData.get('contactTitle'),
                street: formData.get('street'),
                city: formData.get('city'),
                state: formData.get('state'),
                postalCode: formData.get('postalCode'),
                country: formData.get('country'),
                taxId: formData.get('taxId'),
                notes: formData.get('notes')
            };
            
            try {
                if (editingId) {
                    // Update existing
                    const response = await fetch(`/api/companies/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                        e.target.reset();
                        e.target.querySelector('button[type="submit"]').textContent = 'Add Company';
                        editingId = null;
                    }
                } else {
                    // Create new
                    const response = await fetch('/api/companies', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                        e.target.reset();
                    }
                }
            } catch (error) {
                console.error('Error saving company:', error);
                alert('Failed to save company');
            }
        }
        
        // Render functions
        function renderIndividuals(filter = '') {
            const list = document.getElementById('individuals-list');
            const filtered = individuals.filter(i => 
                (i.firstName + ' ' + i.lastName + ' ' + i.email + ' ' + i.company).toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <h3>No individual contacts found</h3>
                        <p>Add your first contact using the form above</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(person => `
                <div class="entry-card">
                    <div class="entry-header">
                        <div class="entry-title">${person.firstName} ${person.lastName}</div>
                        <div class="entry-type">Individual</div>
                    </div>
                    <div class="entry-details">
                        ${person.email ? `<div class="entry-detail"><strong>Email:</strong> <span>${person.email}</span></div>` : ''}
                        ${person.phone ? `<div class="entry-detail"><strong>Phone:</strong> <span>${person.phone}</span></div>` : ''}
                        ${person.mobile ? `<div class="entry-detail"><strong>Mobile:</strong> <span>${person.mobile}</span></div>` : ''}
                        ${person.jobTitle ? `<div class="entry-detail"><strong>Job Title:</strong> <span>${person.jobTitle}</span></div>` : ''}
                        ${person.company ? `<div class="entry-detail"><strong>Company:</strong> <span>${person.company}</span></div>` : ''}
                        ${person.birthday ? `<div class="entry-detail"><strong>Birthday:</strong> <span>${person.birthday}</span></div>` : ''}
                        ${person.street || person.city ? `<div class="entry-detail"><strong>Address:</strong> <span>${[person.street, person.city, person.state, person.postalCode, person.country].filter(Boolean).join(', ')}</span></div>` : ''}
                        ${person.notes ? `<div class="entry-detail" style="grid-column: 1 / -1;"><strong>Notes:</strong> <span>${person.notes}</span></div>` : ''}
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-edit" onclick="editIndividual('${person.id}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteIndividual('${person.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderCompanies(filter = '') {
            const list = document.getElementById('companies-list');
            const filtered = companies.filter(c => 
                (c.companyName + ' ' + c.industry + ' ' + c.email + ' ' + c.contactPerson).toLowerCase().includes(filter.toLowerCase())
            );
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                        <h3>No company contacts found</h3>
                        <p>Add your first company using the form above</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = filtered.map(company => `
                <div class="entry-card">
                    <div class="entry-header">
                        <div class="entry-title">${company.companyName}</div>
                        <div class="entry-type">Company</div>
                    </div>
                    <div class="entry-details">
                        ${company.industry ? `<div class="entry-detail"><strong>Industry:</strong> <span>${company.industry}</span></div>` : ''}
                        ${company.email ? `<div class="entry-detail"><strong>Email:</strong> <span>${company.email}</span></div>` : ''}
                        ${company.phone ? `<div class="entry-detail"><strong>Phone:</strong> <span>${company.phone}</span></div>` : ''}
                        ${company.fax ? `<div class="entry-detail"><strong>Fax:</strong> <span>${company.fax}</span></div>` : ''}
                        ${company.website ? `<div class="entry-detail"><strong>Website:</strong> <span>${company.website}</span></div>` : ''}
                        ${company.contactPerson ? `<div class="entry-detail"><strong>Contact Person:</strong> <span>${company.contactPerson}</span></div>` : ''}
                        ${company.contactTitle ? `<div class="entry-detail"><strong>Contact Title:</strong> <span>${company.contactTitle}</span></div>` : ''}
                        ${company.taxId ? `<div class="entry-detail"><strong>Tax ID:</strong> <span>${company.taxId}</span></div>` : ''}
                        ${company.street || company.city ? `<div class="entry-detail"><strong>Address:</strong> <span>${[company.street, company.city, company.state, company.postalCode, company.country].filter(Boolean).join(', ')}</span></div>` : ''}
                        ${company.notes ? `<div class="entry-detail" style="grid-column: 1 / -1;"><strong>Notes:</strong> <span>${company.notes}</span></div>` : ''}
                    </div>
                    <div class="entry-actions">
                        <button class="btn btn-edit" onclick="editCompany('${company.id}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteCompany('${company.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Edit functions
        function editIndividual(id) {
            const person = individuals.find(i => i.id === id);
            if (!person) return;
            
            editingId = id;
            const form = document.getElementById('individual-form');
            
            form.firstName.value = person.firstName || '';
            form.lastName.value = person.lastName || '';
            form.email.value = person.email || '';
            form.phone.value = person.phone || '';
            form.mobile.value = person.mobile || '';
            form.jobTitle.value = person.jobTitle || '';
            form.company.value = person.company || '';
            form.birthday.value = person.birthday || '';
            form.street.value = person.street || '';
            form.city.value = person.city || '';
            form.state.value = person.state || '';
            form.postalCode.value = person.postalCode || '';
            form.country.value = person.country || '';
            form.notes.value = person.notes || '';
            
            form.querySelector('button[type="submit"]').textContent = 'Update Individual';
            form.scrollIntoView({ behavior: 'smooth' });
        }
        
        function editCompany(id) {
            const company = companies.find(c => c.id === id);
            if (!company) return;
            
            editingId = id;
            const form = document.getElementById('company-form');
            
            form.companyName.value = company.companyName || '';
            form.industry.value = company.industry || '';
            form.email.value = company.email || '';
            form.phone.value = company.phone || '';
            form.fax.value = company.fax || '';
            form.website.value = company.website || '';
            form.contactPerson.value = company.contactPerson || '';
            form.contactTitle.value = company.contactTitle || '';
            form.street.value = company.street || '';
            form.city.value = company.city || '';
            form.state.value = company.state || '';
            form.postalCode.value = company.postalCode || '';
            form.country.value = company.country || '';
            form.taxId.value = company.taxId || '';
            form.notes.value = company.notes || '';
            
            form.querySelector('button[type="submit"]').textContent = 'Update Company';
            form.scrollIntoView({ behavior: 'smooth' });
        }
        
        // Delete functions
        async function deleteIndividual(id) {
            if (confirm('Are you sure you want to delete this contact?')) {
                try {
                    const response = await fetch(`/api/individuals/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadIndividuals();
                    }
                } catch (error) {
                    console.error('Error deleting individual:', error);
                    alert('Failed to delete contact');
                }
            }
        }
        
        async function deleteCompany(id) {
            if (confirm('Are you sure you want to delete this company?')) {
                try {
                    const response = await fetch(`/api/companies/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        await loadCompanies();
                    }
                } catch (error) {
                    console.error('Error deleting company:', error);
                    alert('Failed to delete company');
                }
            }
        }
        
        // Utility functions
        function resetForm(formId) {
            document.getElementById(formId).reset();
            editingId = null;
            const submitBtn = document.getElementById(formId).querySelector('button[type="submit"]');
            submitBtn.textContent = formId === 'individual-form' ? 'Add Individual' : 'Add Company';
        }
        
        function filterEntries(type, value) {
            if (type === 'individual') {
                renderIndividuals(value);
            } else {
                renderCompanies(value);
            }
        }
        
        // Export to Excel
        function exportToExcel(type) {
            const data = type === 'individual' ? individuals : companies;
            if (data.length === 0) {
                alert('No data to export');
                return;
            }
            
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, type === 'individual' ? 'Individuals' : 'Companies');
            
            const fileName = `${type}_contacts_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }
        
        // Export to PDF
        function exportToPDF(type) {
            const data = type === 'individual' ? individuals : companies;
            if (data.length === 0) {
                alert('No data to export');
                return;
            }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFontSize(18);
            doc.text(type === 'individual' ? 'Individual Contacts' : 'Company Contacts', 14, 22);
            
            if (type === 'individual') {
                const tableData = data.map(p => [
                    `${p.firstName} ${p.lastName}`,
                    p.email || '',
                    p.phone || '',
                    p.company || '',
                    p.jobTitle || '',
                    [p.street, p.city, p.state].filter(Boolean).join(', ')
                ]);
                
                doc.autoTable({
                    head: [['Name', 'Email', 'Phone', 'Company', 'Job Title', 'Address']],
                    body: tableData,
                    startY: 30,
                    styles: { fontSize: 8 }
                });
            } else {
                const tableData = data.map(c => [
                    c.companyName,
                    c.industry || '',
                    c.email || '',
                    c.phone || '',
                    c.contactPerson || '',
                    [c.street, c.city, c.state].filter(Boolean).join(', ')
                ]);
                
                doc.autoTable({
                    head: [['Company', 'Industry', 'Email', 'Phone', 'Contact Person', 'Address']],
                    body: tableData,
                    startY: 30,
                    styles: { fontSize: 8 }
                });
            }
            
            const fileName = `${type}_contacts_${new Date().toISOString().split('T')[0]}.pdf`;
            doc.save(fileName);
        }
    </script>
</body>
</html>
